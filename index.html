<!DOCTYPE html>
<html>
<head>
    <title>Bladder Guide Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { --safe: #2ecc71; --caution: #f1c40f; --avoid: #e74c3c; --bg: #f4f4f9; --text: #333; --card: #ffffff; --header: #f4f4f9; }
        body.dark { --bg: #1a1a1a; --text: #f4f4f9; --card: #2c2c2c; --header: #1a1a1a; }
        body { font-family: -apple-system, sans-serif; padding: 15px; max-width: 800px; margin: auto; background: var(--bg); color: var(--text); transition: 0.2s; }
        
        .mode-toggle { position: absolute; top: 15px; right: 15px; z-index: 200; }
        #dark-btn { padding: 6px 12px; border-radius: 20px; border: 1px solid #ccc; background: var(--card); color: var(--text); font-size: 10px; font-weight: bold; cursor: pointer; }

        .controls { position: sticky; top: 0; background: var(--header); padding-bottom: 10px; z-index: 100; border-bottom: 1px solid #ddd; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; background: var(--card); color: var(--text); }
        
        .filter-label { font-size: 10px; font-weight: bold; color: #888; text-transform: uppercase; margin: 5px 0; display: block; }
        .filter-group { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
        
        .btn { padding: 8px 12px; border: 1px solid #ccc; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 11px; background: var(--card); color: var(--text); }
        .btn.active { color: white; border-color: transparent; }
        
        .btn[data-s="Friendly"].active { background: var(--safe); color: #000; }
        .btn[data-s="Caution"].active { background: var(--caution); color: #000; }
        .btn[data-s="Avoid"].active { background: var(--avoid); color: #fff; }
        .btn-type.active { background: #3498db; color: white; border-color: #3498db; }

        .item { background: var(--card); padding: 15px; margin-bottom: 8px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 10px solid #ccc; }
        .item.friendly { border-left-color: var(--safe); }
        .item.caution { border-left-color: var(--caution); }
        .item.avoid { border-left-color: var(--avoid); }
        
        .name { font-weight: bold; font-size: 1.1em; }
        .tag { font-size: 0.7em; background: #eee; padding: 2px 6px; border-radius: 4px; margin-right: 5px; color: #000; font-weight: bold; vertical-align: middle;}
        .details { color: var(--text); opacity: 0.8; font-size: 0.85em; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="mode-toggle">
        <button id="dark-btn" onclick="toggleMode()">DARK MODE</button>
    </div>

    <div class="controls">
        <input type="text" id="search" placeholder="Search across all categories...">
        <span class="filter-label">Safety Status</span>
        <div class="filter-group" id="safety-filters">
            <button class="btn" data-s="Friendly">SAFE</button>
            <button class="btn" data-s="Caution">CAUTION</button>
            <button class="btn" data-s="Avoid">AVOID</button>
        </div>
        <span class="filter-label">Food Type (Select One)</span>
        <div class="filter-group" id="type-filters"></div>
    </div>
    <div id="list"></div>

    <!-- THE 12 DATA FILES -->
    <script src="data_breakfast.js"></script>
    <script src="data_lunch.js"></script>
    <script src="data_dinner.js"></script>
    <script src="data_drinks.js"></script>
    <script src="data_proteins.js"></script>
    <script src="data_sides.js"></script>
    <script src="data_snacks.js"></script>
    <script src="data_pantry.js"></script>
    <script src="data_dining.js"></script>
    <script src="data_brands.js"></script>
    <script src="data_irritants.js"></script>
    <script src="data_vending.js"></script>
    <script src="data_spices.js"></script>

    <script>
        function toggleMode() {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('bMode', isDark ? 'dark' : 'light');
            document.getElementById('dark-btn').innerText = isDark ? 'LIGHT MODE' : 'DARK MODE';
        }

        const savedMode = localStorage.getItem('bMode');
        if(savedMode === 'dark') {
            document.body.classList.add('dark');
            document.getElementById('dark-btn').innerText = 'LIGHT MODE';
        }

        const dataFiles = [
            typeof data_breakfast !== 'undefined' ? data_breakfast : [],
            typeof data_lunch !== 'undefined' ? data_lunch : [],
            typeof data_dinner !== 'undefined' ? data_dinner : [],
            typeof data_drinks !== 'undefined' ? data_drinks : [],
            typeof data_proteins !== 'undefined' ? data_proteins : [],
            typeof data_sides !== 'undefined' ? data_sides : [],
            typeof data_snacks !== 'undefined' ? data_snacks : [],
            typeof data_pantry !== 'undefined' ? data_pantry : [],
            typeof data_dining !== 'undefined' ? data_dining : [],
            typeof data_brands !== 'undefined' ? data_brands : [],
            typeof data_irritants !== 'undefined' ? data_irritants : [],
            typeof data_vending !== 'undefined' ? data_vending : [],
            typeof data_spices !== 'undefined' ? data_spices : []
        ];
        
        const allFoods = [].concat(...dataFiles);
        const listDiv = document.getElementById('list');
        const searchInput = document.getElementById('search');

        // Defaults: Safe on, Breakfast on (if no memory)
        let activeSafety = new Set(JSON.parse(localStorage.getItem('bSafety')) || ['Friendly']);
        let activeType = localStorage.getItem('bType') || 'Breakfast';

        function save() {
            localStorage.setItem('bSafety', JSON.stringify([...activeSafety]));
            localStorage.setItem('bType', activeType);
        }

        document.querySelectorAll('.btn[data-s]').forEach(btn => {
            if(activeSafety.has(btn.dataset.s)) btn.classList.add('active');
            btn.onclick = () => {
                const s = btn.dataset.s;
                btn.classList.toggle('active');
                activeSafety.has(s) ? activeSafety.delete(s) : activeSafety.add(s);
                save(); render();
            };
        });

        const types = [...new Set(allFoods.map(f => f.c || "General"))].sort();
        types.forEach(type => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-type';
            if(activeType === type) btn.classList.add('active');
            btn.textContent = type.toUpperCase();
            btn.onclick = () => {
                document.querySelectorAll('.btn-type').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeType = type;
                save(); render();
            };
            document.getElementById('type-filters').appendChild(btn);
        });

        function render() {
            const search = searchInput.value.toLowerCase();
            listDiv.innerHTML = '';
            const filtered = allFoods.filter(f => {
                const mSearch = f.n.toLowerCase().includes(search) || (f.d && f.d.toLowerCase().includes(search));
                const mSafety = activeSafety.has(f.s);
                const mType = (f.c || "General") === activeType;
                return mSearch && mSafety && mType;
            });
            filtered.forEach(f => {
                listDiv.innerHTML += `<div class="item ${f.s.toLowerCase()}"><span class="tag">${f.c}</span><span class="name">${f.n}</span><div class="details">${f.d || ''}</div></div>`;
            });
        }
        searchInput.oninput = render;
        render();
    </script>
</body>
</html>
