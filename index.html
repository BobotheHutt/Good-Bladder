<!DOCTYPE html>
<html>
<head>
    <title>Bladder Guide Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { --safe: #2ecc71; --caution: #f1c40f; --avoid: #e74c3c; --bg: #f4f4f9; }
        body { font-family: -apple-system, sans-serif; padding: 15px; max-width: 800px; margin: auto; background: var(--bg); }
        .controls { position: sticky; top: 0; background: var(--bg); padding-bottom: 10px; z-index: 100; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .filter-group { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; white-space: nowrap; padding-bottom: 5px; }
        .tab { padding: 8px 15px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; font-size: 12px; background: #ddd; }
        .tab.active { color: white; }
        .tab[data-safety="all"].active { background: #34495e; }
        .tab[data-safety="Friendly"].active { background: var(--safe); }
        .tab[data-safety="Caution"].active { background: var(--caution); }
        .tab[data-safety="Avoid"].active { background: var(--avoid); }
        .item { background: white; padding: 15px; margin-bottom: 8px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 10px solid #ccc; }
        .item.friendly { border-left-color: var(--safe); }
        .item.caution { border-left-color: var(--caution); }
        .item.avoid { border-left-color: var(--avoid); }
        .name { font-weight: bold; font-size: 1.1em; }
        .details { color: #666; font-size: 0.85em; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="controls">
        <input type="text" id="search" placeholder="Search across all categories...">
        <div class="filter-group">
            <button class="tab active" data-safety="all">ALL</button>
            <button class="tab" data-safety="Friendly">SAFE</button>
            <button class="tab" data-safety="Caution">CAUTION</button>
            <button class="tab" data-safety="Avoid">AVOID</button>
        </div>
    </div>
    <div id="list"></div>

    <!-- This is where we load your separate type files -->
    <script src="data_drinks.js"></script>
    <script src="data_breakfast.js"></script>
    <script src="data_proteins.js"></script>

    <script>
        // Combine all arrays from your separate files
        // (Make sure each file defines a unique array name)
        const allFoods = [...data_drinks, ...data_breakfast, ...data_proteins];
        
        let safetyFilter = 'all';
        const listDiv = document.getElementById('list');
        const searchInput = document.getElementById('search');

        function render() {
            const search = searchInput.value.toLowerCase();
            listDiv.innerHTML = '';
            const filtered = allFoods.filter(f => {
                const mSearch = f.n.toLowerCase().includes(search);
                const mSafety = safetyFilter === 'all' || f.s === safetyFilter;
                return mSearch && mSafety;
            });
            filtered.forEach(f => {
                listDiv.innerHTML += `
                    <div class="item ${f.s.toLowerCase()}">
                        <span class="name">${f.n}</span>
                        <div class="details">${f.d}</div>
                    </div>`;
            });
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                safetyFilter = tab.dataset.safety;
                render();
            };
        });

        searchInput.oninput = render;
        render();
    </script>
</body>
</html>
